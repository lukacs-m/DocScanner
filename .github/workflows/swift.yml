# Builds and tests the DocScanner package (iOS-only) and its demo app.
# See: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # DocScanner is iOS-only and uses `@concurrent` + upcoming concurrency features,
    # so it requires Swift 6.2+ (Xcode 26+) and must be built for an iOS simulator,
    # not the macOS host. Adjust the runner image if your org pins a different one.
    runs-on: macos-26
    env:
      SIMULATOR: 'platform=iOS Simulator,name=iPhone 17'
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: SwiftLint
      run: |
        brew install swiftlint
        swiftlint lint --strict

    - name: Build
      run: xcodebuild build -scheme DocScanner -destination 'generic/platform=iOS Simulator'

    - name: Run tests
      run: xcodebuild test -scheme DocScanner -destination "$SIMULATOR"

    - name: Build demo
      run: xcodebuild build -project DocScannerDemo/DocScannerDemo.xcodeproj -scheme DocScannerDemo -destination "$SIMULATOR"
